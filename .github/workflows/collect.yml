name: Hourly Collect

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 정각 (UTC). 실 트리거는 1~15분 지연 가능
  workflow_dispatch:       # 수동 트리거 허용

permissions:
  contents: read

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Run collector
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_DEV_EVENT }}
          ENABLE_FESTA: 'false'
          ENABLE_EVENTUS: 'false'
          ENABLE_LUMA: 'true'
          ENABLE_DEV_EVENT: 'true'
          ENABLE_DEVPOST: 'true'
          USE_MOCK: 'false'
          USE_LLM_CLASSIFY: 'false'
          NODE_ENV: 'production'
        run: npx tsx scripts/collect-cli.ts
